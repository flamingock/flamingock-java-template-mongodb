id: seed-users
transactional: true
template: mongodb-sync-template
targetSystem:
  id: "mongodb"
steps:
  - apply:
      type: insert
      collection: users
      parameters:
        documents:
          - name: "Admin"
            email: "admin@company.com"
            roles: [ "superuser" ]
          - name: "Backup"
            email: "backup@company.com"
            roles: [ "readonly" ]
    rollback:
      type: delete
      collection: users
      parameters:
        filter: {}
