id: apply-and-rollback-test
transactional: false
template: mongodb-sync-template
targetSystem:
  id: "mongodb"

steps:
  - apply:
      type: createCollection
      collection: rollbackTestCollection
    rollback:
      type: dropCollection
      collection: rollbackTestCollection

  - apply:
      type: insert
      collection: rollbackTestCollection
      parameters:
        documents:
          - name: "Item1"
            value: 100
          - name: "Item2"
            value: 200
    rollback:
      type: delete
      collection: rollbackTestCollection
      parameters:
        filter: {}
        multi: true

  - apply:
      type: createIndex
      collection: rollbackTestCollection
      parameters:
        keys:
          name: 1
        options:
          name: "name_index"
          unique: true
    rollback:
      type: dropIndex
      collection: rollbackTestCollection
      parameters:
        indexName: "name_index"
