id: step-based-change
transactional: false
template: mongodb-sync-template
targetSystem:
  id: "mongodb"

steps:
  - apply:
      type: createCollection
      collection: stepTestCollection
    rollback:
      type: dropCollection
      collection: stepTestCollection

  - apply:
      type: insert
      collection: stepTestCollection
      parameters:
        documents:
          - name: "StepItem1"
            value: 100
          - name: "StepItem2"
            value: 200
    rollback:
      type: delete
      collection: stepTestCollection
      parameters:
        filter: {}

  - apply:
      type: createIndex
      collection: stepTestCollection
      parameters:
        keys:
          name: 1
        options:
          name: "step_name_index"
          unique: true
    rollback:
      type: dropIndex
      collection: stepTestCollection
      parameters:
        indexName: "step_name_index"
