id: multiple-operations-change
transactional: false
template: mongodb-sync-template
targetSystem:
  id: "mongodb"

steps:
  - apply:
      type: createCollection
      collection: products
    rollback:
      type: dropCollection
      collection: products

  - apply:
      type: insert
      collection: products
      parameters:
        documents:
          - name: "Laptop"
            price: 999.99
            category: "Electronics"
          - name: "Keyboard"
            price: 79.99
            category: "Electronics"
          - name: "Mouse"
            price: 29.99
            category: "Electronics"
    rollback:
      type: delete
      collection: products
      parameters:
        filter: {}

  - apply:
      type: createIndex
      collection: products
      parameters:
        keys:
          category: 1
        options:
          name: "category_index"
    rollback:
      type: dropIndex
      collection: products
      parameters:
        indexName: "category_index"
